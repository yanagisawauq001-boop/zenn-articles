name: Publish to Qiita
on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Direct API Publish
        env:
          QIITA_TOKEN: ${{ secrets.MY_QIITA_PASS }}
        run: |
          # 記事の中身を読み込んで、直接 Qiita API に POST します
          # ツールを介さないので、Invalid credentials は起き得ません
          BODY=$(cat articles/fresh.md | jq -sRr @json)
          TITLE="Final Success from GitHub Actions"
          
          curl -X POST "https://qiita.com/api/v2/items" \
            -H "Authorization: Bearer $QIITA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"body\": $BODY,
              \"private\": false,
              \"tags\": [{\"name\": \"GitHub\"}],
              \"title\": \"$TITLE\"
            }"