name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Login and Publish
        env:
          QIITA_KEY: ${{ secrets.QIITA_KEY }}
        run: |
          # ツールが「入力を待っている」状態に対し、echoで値を送り込みます
          echo "$QIITA_KEY" | qiita login
          qiita publish --all