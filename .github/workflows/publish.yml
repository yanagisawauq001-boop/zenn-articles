name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Force Create Credentials
        # ツールが「find」などのエラーを出さないよう、
        # 配列の中に、 yanagさんのPCで成功したのと同等のデータを直接書き込みます
        run: |
          mkdir -p ~/.config/qiita-cli
          echo '[{"accessToken":"${{ secrets.MY_QIITA_PASS }}","id":"YanaSho001","name":"default"}]' > ~/.config/qiita-cli/credentials.json

      - name: Publish to Qiita
        run: qiita publish --all