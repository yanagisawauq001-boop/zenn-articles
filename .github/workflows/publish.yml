name: Publish to Qiita
on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  publish_qiita:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Publish to Qiita
        run: qiita publish --all --token ${{ secrets.QIITA_TOKEN }}