name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Deploy Local Success Credentials
        run: |
          mkdir -p ~/.config/qiita-cli
          # Secretの内容（JSON）をそのままファイルに書き出します
          echo '${{ secrets.MY_QIITA_PASS }}' > ~/.config/qiita-cli/credentials.json

      - name: Publish to Qiita
        run: qiita publish --all