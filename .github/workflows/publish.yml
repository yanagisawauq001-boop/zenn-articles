name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Publish to Qiita
        # ログインコマンドを使わず、環境変数 QIITA_TOKEN として直接渡します
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_KEY }}
        run: qiita publish --all