name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli
      - name: Create Credentials
        env:
          MY_KEY: ${{ secrets.QIITA_KEY }}
        run: |
          mkdir -p ~/.config/qiita-cli
          echo "[{\"accessToken\":\"$MY_KEY\",\"id\":\"YanaSho001\",\"name\":\"default\"}]" > ~/.config/qiita-cli/credentials.json
      - name: Publish
        run: qiita publish --all