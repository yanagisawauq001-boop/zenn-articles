name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Publish to Qiita
        # 変数名を「QIITA_ACCESS_TOKEN」にするのが、このツールの絶対ルールでした
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_KEY }}
        run: qiita publish --all