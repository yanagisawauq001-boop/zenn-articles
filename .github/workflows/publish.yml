name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Publish to Qiita
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.MY_QIITA_PASS }}
        run: |
          # 【重要】過去の負の遺産（設定ファイル）を完全に消去してから投稿します
          rm -rf ~/.config/qiita-cli
          qiita publish --all