name: Publish to Qiita
on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  publish_qiita:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Create credentials.json
        run: |
          mkdir -p /home/runner/.config/qiita-cli
          python3 -c "import json, os; print(json.dumps([{'accessToken': os.environ['QIITA_TOKEN'], 'name': 'default'}]))" > /home/runner/.config/qiita-cli/credentials.json
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}

      - name: Publish to Qiita
        run: qiita publish --all