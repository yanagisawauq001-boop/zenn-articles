name: Publish to Qiita
on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'

# 権限を明示的に定義（これが解決の鍵です）
permissions:
  contents: write
  packages: write

jobs:
  publish_qiita:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 自分自身へのpushを許可するためのトークンを指定
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zenn Qiita Sync
        uses: C-Naoki/zenn-qiita-sync@main
        with:
          qiita-token: ${{ secrets.QIITA_TOKEN }}