name: Publish to Qiita
on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  publish_qiita:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Publish to Qiita
        run: |
          mkdir -p /home/runner/.config/qiita-cli
          echo "[{\"accessToken\":\"${{ secrets.QIITA_TOKEN }}\",\"name\":\"github-actions\"}]" > /home/runner/.config/qiita-cli/credentials.json
          qiita publish --all