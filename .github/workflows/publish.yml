name: Publish to Qiita
on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  publish_qiita:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 認証情報の保存先フォルダを強制的に作成
      - name: Prepare Qiita CLI config
        run: mkdir -p /home/runner/.config/qiita-cli

      - name: Zenn Qiita Sync
        uses: C-Naoki/zenn-qiita-sync@main
        with:
          qiita-token: ${{ secrets.QIITA_TOKEN }}