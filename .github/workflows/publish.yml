name: Publish to Qiita
on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Direct API Publish
        env:
          QIITA_TOKEN: ${{ secrets.MY_QIITA_PASS }}
        run: |
          # 1. 安全に JSON を組み立ててファイルに保存
          jq -n \
            --arg body "$(cat articles/fresh.md)" \
            --arg title "Yokohama Dev Log $(date +'%H:%M:%S')" \
            '{body: $body, private: false, tags: [{name: "GitHub"}], title: $title}' > payload.json
          
          # 2. ファイルをそのまま送信（これが一番壊れにくい）
          RESPONSE=$(curl -s -X POST "https://qiita.com/api/v2/items" \
            -H "Authorization: Bearer $QIITA_TOKEN" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          
          echo "Response from Qiita: $RESPONSE"
          
          # エラー判定
          if echo "$RESPONSE" | jq -e '.message' > /dev/null; then
            echo "Failed to publish."
            exit 1
          fi