name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli
      - name: Create Config
        env:
          TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          mkdir -p ~/.config/qiita-cli
          # あなたのID「YanaSho001」を明示的に指定して、設定ファイルを作成します
          echo "[{\"accessToken\":\"$TOKEN\",\"id\":\"YanaSho001\",\"name\":\"default\"}]" > ~/.config/qiita-cli/credentials.json
      - name: Publish
        run: qiita publish --all --no-incremental