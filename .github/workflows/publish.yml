name: Publish to Qiita
on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Direct API Publish
        env:
          QIITA_TOKEN: ${{ secrets.MY_QIITA_PASS }}
        run: |
          BODY_JSON=$(cat articles/fresh.md | jq -sRr @json)
          
          # 実行結果を変数に格納し、中身を表示させます
          RESPONSE=$(curl -s -X POST "https://qiita.com/api/v2/items" \
            -H "Authorization: Bearer $QIITA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"body\": $BODY_JSON,
              \"private\": false,
              \"tags\": [{\"name\": \"test\"}],
              \"title\": \"Final Victory Check from Yokohama\"
            }")
          
          echo "Qiita API Response: $RESPONSE"
          
          # エラーメッセージが含まれているかチェック
          if [[ $RESPONSE == *"message"* ]]; then
            echo "API returned an error."
            exit 1
          fi