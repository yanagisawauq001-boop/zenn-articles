name: Publish to Qiita
on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Direct API Publish
        env:
          QIITA_TOKEN: ${{ secrets.MY_QIITA_PASS }}
        run: |
          # 本文を取得
          BODY_JSON=$(cat articles/fresh.md | jq -sRr @json)
          # 現在時刻をタイトルに混ぜて重複を避ける
          TITLE="Yokohama Dev Log $(date +'%H:%M:%S')"
          
          echo "Sending to Qiita..."
          
          # 修正ポイント: tags をより厳格なJSON形式で組み立て
          RESPONSE=$(curl -s -X POST "https://qiita.com/api/v2/items" \
            -H "Authorization: Bearer $QIITA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"body\": $BODY_JSON,
              \"private\": false,
              \"tags\": [{\"name\": \"GitHub\"}, {\"name\": \"Test\"}],
              \"title\": \"$TITLE\"
            }")
          
          echo "Response from Qiita: $RESPONSE"
          
          # エラーがあれば終了させる
          if echo "$RESPONSE" | jq -e '.message' > /dev/null; then
            echo "Failed to publish."
            exit 1
          fi
          
          echo "Success! Article created."