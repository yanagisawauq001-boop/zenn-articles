name: Publish to Qiita
on:
  push:
    branches: [ main ]
    paths: [ 'articles/**' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Publish to Qiita
        env:
          # GitHubに登録した「MY_QIITA_PASS」を
          # ツールが認識できる「QIITA_ACCESS_TOKEN」として渡します
          QIITA_ACCESS_TOKEN: ${{ secrets.MY_QIITA_PASS }}
        run: qiita publish --all